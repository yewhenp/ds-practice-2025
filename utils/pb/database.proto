syntax = "proto3";

package bookstore;

import "commit_protocol.proto";

service DatabaseService {
    rpc ReadData (BookDataMessage) returns (BookDataMessage);
    
    rpc Prepare (BookDataMessage) returns (CommitStatus);
    rpc Commit (BookDataMessage) returns (CommitStatus);
    rpc Abort (BookDataMessage) returns (CommitStatus);

    rpc TopUp (BookDataMessage) returns (CommitStatus);
}
